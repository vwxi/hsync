syntax = "proto3";

package hsync;

message Auth {
  int64 id = 1;
  string room = 2;
}

message Die {
  int64 id = 1;
  optional string reason = 2;
}

// batch comparisons
message Compare {
  message FilePair {
    int64 name = 1;
    int64 hash = 2;
  }
  repeated FilePair entries = 1;
}

message CreateEvent {}
message DeleteEvent {}
message ModifyEvent {}

message Event {
  oneof info {
    CreateEvent create = 1;
  }
}

message Packet {
  oneof message {
    Auth auth = 1;
    Die die = 2;
    Compare compare = 3;
  }
}
