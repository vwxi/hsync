syntax = "proto3";

package hsync;

import "google/protobuf/timestamp.proto";

// if there is no folder provided then
// the password will be interpreted as the passcode for a new folder
message Auth {
  optional string folder = 1;
  string password = 2;
}

// returned after auth works
message RoomInfo {
  uint64 id = 1;
  string code = 2;
}

message Die {
  optional string reason = 1;
}

message BlockMetadata {
  uint64 start = 1;
  uint64 end = 2;
  optional uint64 namehash = 3;
  uint64 hash = 4;
}

// describes a file.
message FileManifest {
  string filename = 1;
  uint64 timestamp = 2;
  repeated BlockMetadata blocks = 3;
}

message Delta {
  enum OpType {
    OP_TYPE_EQUAL_UNSPECIFIED = 0;
    OP_TYPE_MODIFY = 1;
    OP_TYPE_INSERT = 2;
    OP_TYPE_DELETE = 3;
  }

  message Operation {
    OpType op_type = 1;
    uint64 hash = 2;
    uint64 start = 3;
    uint64 end = 4;
  }

  uint64 size = 1;
  uint64 namehash = 2;
  repeated Operation ops = 3;
}

enum DataMode {
  DATA_MODE_WHOLE_UNSPECIFIED = 0;
  DATA_MODE_DELTA = 1;
}

// if no data, is a request for data
// if data, is either a response to a request or lone data transfer (from server)
message Transfer {
  BlockMetadata metadata = 1;
  DataMode mode = 2;
  optional bytes data = 3;
}

enum FileEvent {
  FILE_EVENT_CREATE_UNSPECIFIED = 0;
  FILE_EVENT_DELETE = 1;
}

message Event {
  FileEvent event = 1;
  string filename = 2;
}

enum Return {
  ERROR_NONE_UNSPECIFIED = 0;
  ERROR_BLOCK_MISMATCH = 1;
}

message Packet {
  Return code = 1;

  oneof message {
    Auth auth = 2;
    Die die = 3;
    RoomInfo room_info = 4;
    FileManifest manifest = 5;
    Transfer transfer = 6;
    Event event = 7;
    Delta delta = 8;
  }
}
