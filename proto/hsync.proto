syntax = "proto3";

package hsync;

import "google/protobuf/timestamp.proto";

// if there is no folder provided then
// the password will be interpreted as the passcode for a new folder
message Auth {
  optional string folder = 1;
  string password = 2;
}

// returned after auth works
message RoomInfo {
  uint64 id = 1;
  string code = 2;
}

message Die {
  optional string reason = 1;
}

message BlockMetadata {
  uint64 offset = 1;
  uint64 hash = 2;
  uint64 timestamp = 3;
}

message Block {
  BlockMetadata metadata = 1;
  bytes data = 2;
}

// describes a file.
// a manifest can describe parts of a file, the server will simply process whatever is sent to it
// blocks that are newer than registered will be requested by the server
// blocks that are older than registered will make the server send data
//
// server checks if filename exists for folder in database. if none, creates file in folder on database.
// client checks if filename exists on local filesystem and database. if none, creates file in folder and db
//
// in server->client, metadata "hash" field is hash of filename
message FileManifest {
  string filename = 1;
  repeated BlockMetadata blocks = 2;
}

enum DataMode {
  DATA_MODE_WHOLE_UNSPECIFIED = 0;
  DATA_MODE_DELTA = 1;
}

// if no data, is a request for data
// if data, is either a response to a request or lone data transfer (from server)
message Transfer {
  BlockMetadata metadata = 1;
  DataMode mode = 2;
  optional bytes data = 3;
}

enum FileEvent {
  FILE_EVENT_CREATE_UNSPECIFIED = 0;
  FILE_EVENT_DELETE = 1;
}

message Event {
  FileEvent event = 1;
  string filename = 2;
}

enum Return {
  ERROR_NONE_UNSPECIFIED = 0;
  ERROR_BLOCK_MISMATCH = 1;
}

message Packet {
  Return code = 1;

  oneof message {
    Auth auth = 2;
    Die die = 3;
    RoomInfo room_info = 4;
    FileManifest manifest = 5;
    Transfer transfer = 6;
    Event event = 7;
  }
}
