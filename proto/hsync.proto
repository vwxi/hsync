syntax = "proto3";

package hsync;

import "google/protobuf/timestamp.proto";

// if there is no room provided then
// the passcode will be interpreted as the passcode for a new folder
message Auth {
  int64 id = 1;
  optional string room = 2;
  string passcode = 3;
}

message RoomInfo {
  string code = 1;
}

message Die {
  int64 id = 1;
  optional string reason = 2;
}

message BlockMetadata {
  uint64 offset = 1;
  uint64 hash = 2;
  uint64 timestamp = 3;
}

message Block {
  BlockMetadata metadata = 1;
  bytes data = 2;
}

// describes a file.
// server checks if filename exists for folder in database. if none, creates file in folder on database.
// client checks if filename exists on local filesystem and database. if none, creates file in folder and db
message FileManifest {
  string filename = 1;
  repeated BlockMetadata blocks = 2;
}

message CreateEvent {}
message DeleteEvent {}
message ModifyEvent {}

message Event {
  oneof info {
    CreateEvent create = 1;
  }
}

message Packet {
  oneof message {
    Auth auth = 1;
    Die die = 2;
    RoomInfo room_info = 3;
    FileManifest manifest = 4;
  }
}
